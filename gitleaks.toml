title = "Configuração customizada do desafio DevSecOps"

# Mantém todas as regras padrão do Gitleaks (AWS, GitHub tokens, Stripe, etc.)
[extend]
useDefault = true

# Regra adicional: pega senhas/segredos hardcoded mesmo com caracteres especiais
# (a regra genérica padrão do Gitleaks ignora valores com @, #, !, etc.)
[[rules]]
id = "hardcoded-password-special-chars"
description = "Senha ou segredo hardcoded, incluindo caracteres especiais"
regex = '''(?i)(password|passwd|pwd|db_password|secret)\s*[:=]\s*["']([^"'\s]{6,})["']'''
secretGroup = 2
keywords = ["password", "passwd", "pwd", "db_password", "secret"]
